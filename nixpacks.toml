# nixpacks.toml
[phases.setup]
nixPkgs = [
  "chromium",
  "nss",
  "nspr",
  "atk",
  "at-spi2-atk",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "libgbm",
  "libxkbcommon",
  "pango",
  "cairo",
  "alsa-lib",
  "cups"
]

[phases.install]
cmds = [
  "pip install requests beautifulsoup4 playwright flask",
  "playwright install chromium"
]

[start]
cmd = "python thetvappproxy.py"